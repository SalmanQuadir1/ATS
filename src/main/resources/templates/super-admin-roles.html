<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head></head>
<body>
<div th:fragment="content">

    <div class="mb-8">
        <h2 class="text-2xl font-black text-slate-800 tracking-tight">Role Management</h2>
        <p class="text-sm text-slate-500 mt-1">Create and manage dynamic roles and their permissions.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Roles List -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between">
                    <div>
                        <h4 class="text-lg font-bold text-slate-800">All Roles</h4>
                        <p class="text-xs text-slate-400 mt-0.5">Manage permissions for each role.</p>
                    </div>
                </div>

                <div class="divide-y divide-slate-50">
                    <div th:each="role : ${roles}" class="px-8 py-5 hover:bg-slate-50/70 transition-colors">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center font-black text-sm">
                                    <span th:text="${role.name.substring(0,1).toUpperCase()}">R</span>
                                </div>
                                <div>
                                    <p class="font-bold text-slate-800" th:text="${role.name}">Role Name</p>
                                    <span th:if="${role.isSystemRole}" class="text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md">System Role</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button th:onclick="'document.getElementById(\'edit-role-\' + ' + ${role.id} + ').classList.toggle(\'hidden\')'"
                                        class="text-xs font-bold px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors">
                                    Edit Permissions
                                </button>
                                <form th:unless="${role.isSystemRole}" th:action="@{'/super-admin/roles/delete/' + ${role.id}}" method="post" onsubmit="return confirm('Delete this role?');">
                                    <button type="submit" class="text-xs font-bold px-3 py-1.5 bg-rose-50 text-rose-500 rounded-lg hover:bg-rose-100 transition-colors">
                                        Delete
                                    </button>
                                </form>
                            </div>
                        </div>

                        <!-- Edit Form -->
                        <div th:id="'edit-role-' + ${role.id}" class="hidden mt-4 pt-4 border-t border-slate-100">
                            <form th:action="@{'/super-admin/roles/update/' + ${role.id}}" method="post">
                                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-4">
                                    <label th:each="perm : ${allPermissions}" class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                                        <input type="checkbox" name="permissions" th:value="${perm.name}"
                                               th:checked="${#lists.contains(role.permissions, perm.name)}"
                                               class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                                        <span th:text="${perm.name}">PERM</span>
                                    </label>
                                </div>
                                <button type="submit" class="text-xs font-bold px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 transition-colors">Save Permissions</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Forms Column -->
        <div class="space-y-8">
            <!-- Create Role Form -->
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-8">
                <h5 class="text-sm font-bold text-slate-700 uppercase tracking-widest mb-6">Create Custom Role</h5>
                <form th:action="@{/super-admin/roles/create}" method="post" class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Role Name *</label>
                        <input type="text" name="name" required placeholder="e.g. ROLE_AUDITOR"
                               class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>

                    <div class="space-y-2 mt-4">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Permissions</label>
                        <div class="space-y-2 max-h-60 overflow-y-auto p-2 bg-slate-50 rounded-xl border border-slate-100">
                            <label th:each="perm : ${allPermissions}" class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer" th:title="${perm.description}">
                                <input type="checkbox" name="permissions" th:value="${perm.name}"
                                       class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                                <span th:text="${perm.name}">PERM</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit"
                            class="w-full mt-4 py-3.5 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold rounded-2xl hover:from-emerald-700 hover:to-teal-700 transition-all shadow-lg shadow-emerald-200 text-sm">
                        Create Role
                    </button>
                </form>
            </div>

            <!-- Create Permission Module Form -->
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-8">
                <h5 class="text-sm font-bold text-slate-700 uppercase tracking-widest mb-6">Create Permission Module</h5>
                <form th:action="@{/super-admin/roles/module/create}" method="post" class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Module Name *</label>
                        <input type="text" name="name" required placeholder="e.g. MANAGE_INVOICES"
                               class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm uppercase focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Description *</label>
                        <input type="text" name="description" required placeholder="e.g. Can view and edit tenant invoices"
                               class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>

                    <button type="submit"
                            class="w-full mt-4 py-3.5 bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold rounded-2xl hover:from-indigo-700 hover:to-blue-700 transition-all shadow-lg shadow-indigo-200 text-sm">
                        Add Module
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
