<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head></head>
<body>
    <div th:fragment="content">
        <div class="max-w-2xl mx-auto">
            <div class="mb-8 text-center">
                <h3 class="text-3xl font-bold text-slate-800">Change Password</h3>
                <p class="text-slate-500">Update your security credentials.</p>
            </div>

            <div class="bg-white rounded-[2.5rem] p-10 border border-slate-100 shadow-xl shadow-slate-200/50">

                <form th:action="@{/users/password}" method="POST" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">New Password</label>
                        <input type="password" name="newPassword" required 
                               class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-rose-500 outline-none transition-all">
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Confirm New Password</label>
                        <input type="password" name="confirmPassword" required 
                               class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-rose-500 outline-none transition-all">
                    </div>

                    <div class="pt-6 border-t border-slate-50">
                        <button type="submit" 
                                class="w-full bg-rose-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-rose-500/30 hover:bg-rose-700 hover:scale-[1.01] transition-all">
                            Update Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
