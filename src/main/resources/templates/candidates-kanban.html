<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head></head>
<body>
    <div th:fragment="content">
        <!-- Header area with quick action and search filter controls -->
        <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h3 class="text-3xl font-extrabold text-slate-800 tracking-tight">Recruitment Pipeline Board</h3>
                <p class="text-slate-500 mt-1">Visualize, track, and advance applicant application statuses across recruiting stages.</p>
            </div>
            
            <!-- Quick filters bar -->
            <div class="flex flex-wrap items-center gap-3">
                <!-- Search candidates -->
                <div class="relative">
                    <input type="text" id="kanbanSearch" placeholder="Search by name, skills..." 
                           class="bg-white border border-slate-200 text-slate-750 rounded-2xl px-4 py-2.5 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 w-60 shadow-sm"
                           onkeyup="filterKanban()">
                    <svg class="w-4 h-4 text-slate-400 absolute left-3.5 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                
                <!-- Filter by Job Vacancy -->
                <div class="relative">
                    <select id="jobFilter" onchange="filterKanban()"
                            class="bg-white border border-slate-200 text-slate-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 shadow-sm font-semibold max-w-xs">
                        <option value="ALL">All Job Vacancies</option>
                        <option th:each="job : ${jobs}" th:value="${job.id}" th:text="${job.title}">Job Vacancy</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Kanban Columns Board Container -->
        <div class="overflow-x-auto pb-6">
            <div class="flex gap-4 min-w-[1200px] h-[calc(100vh-230px)]">
                <!-- Loop over candidate statuses to build columns -->
                <div th:each="st : ${statuses}" 
                     class="flex-1 min-w-[280px] bg-slate-50 border border-slate-200/60 rounded-3xl p-4 flex flex-col h-full shadow-inner">
                    <!-- Column Header -->
                    <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-200/50">
                        <div class="flex items-center space-x-2.5">
                            <span class="w-3 h-3 rounded-full" 
                                  th:classappend="${st.toString() == 'APPLIED' ? 'bg-emerald-500 shadow-md shadow-emerald-200' :
                                                   (st.toString() == 'SHORTLISTED' ? 'bg-orange-500 shadow-md shadow-orange-200' :
                                                   (st.toString() == 'INTERVIEW' ? 'bg-amber-500 shadow-md shadow-amber-200' :
                                                   (st.toString() == 'OFFERED' ? 'bg-violet-500 shadow-md shadow-violet-200' :
                                                   (st.toString() == 'HIRED' ? 'bg-emerald-500 shadow-md shadow-emerald-200' :
                                                   (st.toString() == 'REJECTED' ? 'bg-rose-500 shadow-md shadow-rose-200' : 'bg-slate-500 shadow-md shadow-slate-200')))))}"></span>
                            <span class="font-extrabold text-slate-700 text-sm tracking-tight" 
                                  th:text="${st.toString() == 'KIV' ? 'KIV (Keep in View)' : st.toString()}">APPLIED</span>
                        </div>
                        <span th:id="'count-' + ${st}" class="text-xs bg-slate-200/80 font-black text-slate-500 px-2.5 py-1 rounded-full">0</span>
                    </div>

                    <!-- Column Cards Stack -->
                    <div th:id="'col-' + ${st}" class="flex-1 overflow-y-auto space-y-3 pr-1.5">
                        <!-- Candidate Card -->
                        <div th:each="c : ${candidates}" 
                             th:if="${c.status == st}"
                             th:data-job-id="${c.taggedRoles}"
                             th:data-skills="${#strings.toLowerCase(c.skills)}"
                             th:data-name="${#strings.toLowerCase(c.fullName)}"
                             class="candidate-card bg-white p-4.5 rounded-2xl border border-slate-200/70 shadow-sm hover:shadow-md hover:border-slate-300 transition-all duration-300 flex flex-col space-y-3 relative group">
                            
                            <!-- Full name link and dynamic HM shared visual tag -->
                            <div class="flex items-start justify-between gap-1">
                                <a th:href="@{'/candidates/' + ${c.id}}" 
                                   class="text-sm font-black text-slate-800 hover:text-teal-600 transition-colors tracking-tight leading-snug break-words pr-2"
                                   th:text="${c.fullName}">John Doe</a>
                                <span th:if="${c.sharedWithHM}" 
                                      title="Profile Shared with Hiring Manager"
                                      class="bg-teal-50 border border-teal-100 text-teal-600 text-[8px] font-extrabold px-1.5 py-0.5 rounded-md uppercase tracking-wider whitespace-nowrap">HM</span>
                            </div>

                            <!-- Experience & Expected Salary -->
                            <div class="flex items-center justify-between text-[11px] text-slate-400 font-semibold uppercase tracking-wider">
                                <span th:text="${c.experienceYears} + ' Yrs Exp'">3 Yrs Exp</span>
                                <span th:text="${c.expectedSalary != null ? '$' + #numbers.formatInteger(c.expectedSalary, 0, 'COMMA') : 'Salary N/A'}">$5,000</span>
                            </div>

                            <!-- Core Skills pills display -->
                            <div class="flex flex-wrap gap-1 mt-1">
                                <span th:each="skill : ${#strings.arraySplit(c.skills, ',')}" 
                                      th:text="${#strings.trim(skill)}"
                                      class="bg-slate-100 text-slate-600 text-[9px] font-semibold px-2 py-0.5 rounded-lg whitespace-nowrap">Skill</span>
                            </div>

                            <!-- Controls for moving candidate status instantly -->
                            <div class="pt-3 border-t border-slate-100 flex items-center justify-between">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Shift Phase</span>
                                <form th:action="@{'/candidates/' + ${c.id} + '/move'}" method="POST" class="inline">
                                    <select name="status" onchange="this.form.submit()" 
                                            class="text-[10px] bg-slate-50 border border-slate-200 hover:border-slate-300 rounded-xl px-2 py-1 focus:outline-none focus:ring-2 focus:ring-teal-500 font-bold text-slate-600 transition-all cursor-pointer">
                                        <option th:each="opt : ${statuses}" 
                                                th:value="${opt}" 
                                                th:text="${opt.toString() == 'KIV' ? 'KIV' : opt.toString()}"
                                                th:selected="${c.status == opt}"></option>
                                    </select>
                                </form>
                            </div>
                        </div>

                        <!-- Fallback empty state representation -->
                        <div class="no-candidates hidden p-6 text-center border-2 border-dashed border-slate-200 rounded-2xl">
                            <span class="text-xs text-slate-400 font-medium">Empty Stage</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function filterKanban() {
                const searchVal = document.getElementById('kanbanSearch').value.toLowerCase().trim();
                const jobVal = document.getElementById('jobFilter').value;
                const cards = document.querySelectorAll('.candidate-card');

                cards.forEach(card => {
                    const name = card.getAttribute('data-name') || '';
                    const skills = card.getAttribute('data-skills') || '';
                    const jobId = card.getAttribute('data-job-id') || '';

                    // Check search query
                    const matchesSearch = searchVal === '' || name.includes(searchVal) || skills.includes(searchVal);
                    // Check job vacancy query
                    const matchesJob = jobVal === 'ALL' || jobId === jobVal;

                    if (matchesSearch && matchesJob) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });

                recomputeCounts();
            }

            function recomputeCounts() {
                const columns = ['APPLIED', 'SHORTLISTED', 'INTERVIEW', 'OFFERED', 'HIRED', 'REJECTED', 'KIV'];
                columns.forEach(st => {
                    const colEl = document.getElementById('col-' + st);
                    if (colEl) {
                        // Count visible cards
                        const visibleCards = colEl.querySelectorAll('.candidate-card[style*="display: flex"], .candidate-card:not([style])');
                        const countEl = document.getElementById('count-' + st);
                        if (countEl) {
                            countEl.innerText = visibleCards.length;
                        }
                    }
                });
            }

            // Init counts on startup
            window.addEventListener('DOMContentLoaded', () => {
                recomputeCounts();
            });
        </script>
    </div>
</body>
</html>
