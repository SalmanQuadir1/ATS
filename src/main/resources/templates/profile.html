<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23059669'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3ESTIE%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div th:fragment="content">
        <div class="max-w-2xl mx-auto">
            <div class="mb-8">
                <h3 class="text-3xl font-bold text-slate-800">User Profile</h3>
                <p class="text-slate-500">Manage your account settings and security.</p>
            </div>

            <!-- Profile Info -->
            <div class="bg-white rounded-[2rem] p-8 border border-slate-100 shadow-xl shadow-slate-200/50 mb-8">
                <div class="flex items-center mb-8">
                    <div class="w-20 h-20 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold shadow-lg shadow-emerald-200">
                        <span th:text="${user.displayName != null && user.displayName.length() > 0 ? #strings.substring(user.displayName, 0, 1).toUpperCase() : #strings.substring(user.username, 0, 1).toUpperCase()}">U</span>
                    </div>
                    <div class="ml-6">
                        <h4 class="text-xl font-bold text-slate-800" th:text="${user.displayName != null ? user.displayName : user.username}">Username</h4>
                        <div class="flex flex-wrap gap-2 mt-2">
                            <span th:each="role : ${user.roles}" class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold uppercase rounded-full" th:text="${#strings.replace(role.name, 'ROLE_', '')}">ROLE</span>
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold uppercase rounded-full">ACTIVE</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Username</p>
                        <p class="text-sm font-semibold text-slate-700" th:text="${user.username}">admin</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Email Address</p>
                        <p class="text-sm font-semibold text-slate-700" th:text="${user.email != null ? user.email : 'Not Provided'}">admin@stie.com</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tenant / Site</p>
                        <p class="text-sm font-semibold text-slate-700" th:text="${user.tenant != null ? user.tenant.name : 'System / Super Admin'}">Site Name</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Location</p>
                        <p class="text-sm font-semibold text-slate-700" th:text="${user.tenant != null && user.tenant.location != null ? user.tenant.location : 'N/A'}">Location</p>
                    </div>
                </div>
            </div>

            </div>
        </div>
    </div>
</body>
</html>
