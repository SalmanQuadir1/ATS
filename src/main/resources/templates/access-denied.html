<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head></head>
<body>
    <div th:fragment="content">
        <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
            <div class="mb-8 relative">
                <div class="w-32 h-32 bg-rose-50 rounded-full flex items-center justify-center animate-pulse">
                    <svg class="w-16 h-16 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <div class="absolute -top-2 -right-2 bg-white p-2 rounded-full shadow-lg">
                    <svg class="w-6 h-6 text-rose-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                </div>
            </div>

            <h1 class="text-4xl font-extrabold text-slate-800 mb-4 tracking-tight">Access Denied</h1>
            <p class="text-lg text-slate-500 mb-10 max-w-md mx-auto">
                Oops! It looks like you don't have the required permissions to access this high-security area.
            </p>

            <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">
                <a th:href="@{/}" class="bg-slate-800 text-white font-bold px-10 py-4 rounded-2xl shadow-xl shadow-slate-200 hover:bg-slate-900 hover:scale-[1.02] transition-all">
                    Return to Dashboard
                </a>
                <button onclick="window.history.back()" class="bg-white text-slate-600 font-bold px-10 py-4 rounded-2xl border border-slate-200 hover:bg-slate-50 transition-all">
                    Go Back
                </button>
            </div>

            <div class="mt-12 pt-8 border-t border-slate-100 flex items-center text-slate-400">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="text-xs">If you believe this is an error, please contact your System Administrator.</p>
            </div>
        </div>
    </div>
</body>
</html>
