<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23059669'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3ESTIE%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div th:fragment="content">
        <div class="max-w-5xl mx-auto py-8">
            <div class="flex justify-between items-start mb-8 px-4">
                <h3 class="text-3xl font-black text-slate-800 tracking-tight">Offer Letter Preview</h3>
                <button onclick="window.print()" class="px-5 py-2.5 bg-slate-800 text-white rounded-xl text-sm font-bold shadow-lg shadow-slate-200 hover:bg-slate-900 transition-all hover:-translate-y-0.5">
                    Print / Download PDF
                </button>
            </div>
            
            <div class="bg-white mx-auto shadow-[0_8px_30px_rgb(0,0,0,0.12)] p-[40px] md:p-[60px] rounded-lg border-t-[16px] border-emerald-600 font-sans text-slate-700 whitespace-pre-wrap leading-relaxed max-w-[800px] text-sm md:text-base mb-8">
                <div class="flex justify-between items-start border-b border-slate-100 pb-6 mb-6">
                    <div>
                        <h2 class="text-2xl font-black text-emerald-800 tracking-tight">STIE Pte Ltd</h2>
                        <p class="text-xs text-slate-400 mt-1">Human Resources Department</p>
                    </div>
                    <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600 font-bold text-xl">
                        S
                    </div>
                </div>
                <div th:text="${letter}"></div>
            </div>
            
            <div class="mt-8 flex justify-center space-x-6 max-w-[800px] mx-auto px-4">
                <div class="px-8 py-3.5 bg-emerald-50 text-emerald-700 rounded-2xl font-bold text-center border-2 border-emerald-100 flex items-center shadow-sm">
                    <svg class="w-5 h-5 inline-block mr-2 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Email Delivered Automatically
                </div>
                <a th:href="@{/candidates}" class="px-8 py-3.5 bg-white border-2 border-slate-200 text-slate-600 rounded-2xl font-bold text-center hover:border-slate-300 hover:bg-slate-50 transition-all flex items-center shadow-sm hover:shadow-md">
                    Back to Pool
                </a>
            </div>
        </div>
    </div>
</body>
</html>
