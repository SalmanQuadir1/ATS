<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23059669'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3ESTIE%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div th:fragment="content">
        <div class="max-w-5xl mx-auto bg-white p-12 rounded-3xl border border-slate-100 shadow-sm">
            <div class="flex justify-between items-start mb-12">
                <h3 class="text-2xl font-bold text-slate-800">Offer Letter Preview</h3>
                <button onclick="window.print()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors">
                    Print / Download PDF
                </button>
            </div>
            
            <div class="bg-slate-50 p-10 rounded-2xl border border-slate-100 font-sans text-slate-700 whitespace-pre-wrap leading-relaxed shadow-inner" 
                 th:text="${letter}">
                Letter content goes here...
            </div>
            
            <div class="mt-12 flex space-x-4">
                <div class="flex-1 py-3 bg-emerald-50 text-emerald-700 rounded-xl font-bold text-center border border-emerald-200 flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Email Delivered Automatically
                </div>
                <a th:href="@{/candidates}" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold text-center hover:bg-slate-200 transition-colors flex items-center justify-center">
                    Back to Pool
                </a>
            </div>
        </div>
    </div>
</body>
</html>
