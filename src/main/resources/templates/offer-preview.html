<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Offer Letter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            font-size: 13px;
            line-height: 1.8;
            color: #1e293b;
            background: #f1f5f9;
        }

        /* â”€â”€ Toolbar (screen only) â”€â”€ */
        .toolbar {
            background: #1e293b;
            color: white;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .toolbar-title { font-size: 14px; font-weight: 600; opacity: 0.9; }
        .btn-print {
            background: #059669;
            color: white;
            border: none;
            padding: 9px 22px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: background 0.2s;
        }
        .btn-print:hover { background: #047857; }
        .btn-back {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-back:hover { background: #334155; color: white; }

        /* â”€â”€ Page wrapper â”€â”€ */
        .page-wrap {
            max-width: 860px;
            margin: 32px auto;
            padding: 0 24px 48px;
        }

        /* â”€â”€ Paper â”€â”€ */
        .paper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            padding: 56px 72px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }


        .letter-body {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            max-width: 100%;
            line-height: 2;
        }

        /* â”€â”€ Print styles â”€â”€ */
        @media print {
            body        { background: white; font-size: 9.5pt; }
            .toolbar    { display: none !important; }
            .page-wrap  { max-width: 100%; margin: 0; padding: 0; }
            .paper      { box-shadow: none; border-radius: 0; padding: 10mm 15mm; }
            .letter-body    { line-height: 1.4; font-size: 9.5pt; }
            @page { size: auto; margin: 0; }
        }
    </style>
</head>
<body>

    <!-- Toolbar (hidden on print) -->
    <div class="toolbar">
        <div class="toolbar-title" th:text="${pageTitle}">Offer Letter</div>
        <div style="display:flex;gap:10px;align-items:center;">
            <a th:href="@{/candidates}" class="btn-back">← Back to Pool</a>
            <button class="btn-print" onclick="window.print()">
                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                Print / Save as PDF
            </button>
        </div>
    </div>

    <!-- Document -->
    <div class="page-wrap">
        
        <!-- Success Banner (hidden on print) -->
        <div th:if="${success}" class="success-banner" style="background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46; padding:12px 20px; border-radius:8px; margin-bottom:20px; display:flex; align-items:center; gap:10px; font-weight:600; font-size:13px;">
            <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span th:text="${success}">Email Delivered Automatically</span>
        </div>

        <div class="paper">
            <!-- Letter Content -->
            <div class="letter-body" th:text="${letter}">Letter content here...</div>
        </div>
    </div>

</body>
</html>
