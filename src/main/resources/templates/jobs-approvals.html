<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: html}">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23059669'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3ESTIE%3C/text%3E%3C/svg%3E">
</head>
<body>
<div th:fragment="content">

    <!-- ── Page Header ────────────────────────────────────────────────── -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h3 class="text-2xl font-bold text-slate-800">Pending Approvals</h3>
            <p class="text-slate-500 text-sm mt-0.5">
                <span th:text="${#lists.size(jobs)}">0</span> job<span th:if="${#lists.size(jobs) != 1}">s</span> pending
            </p>
        </div>
    </div>

    <!-- ── Tabs ──────────────────────────── -->
    <div class="flex gap-4 mb-4 border-b border-slate-100" sec:authorize="hasAuthority('APPROVE_JOBS')">
        <a th:href="@{/jobs}"
           class="pb-2 text-sm font-medium text-slate-400 hover:text-slate-700 border-b-2 border-transparent transition">All Jobs</a>
        <a th:href="@{/jobs/approvals}"
           class="pb-2 text-sm font-semibold border-b-2 border-emerald-500 text-emerald-600">Pending Approvals</a>
    </div>

    <!-- ── Table ─────────────────────────────────────────────────────── -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100">
                        <th class="text-left px-5 py-3.5 font-semibold text-slate-500 text-xs uppercase tracking-wider">#</th>
                        <th class="text-left px-5 py-3.5 font-semibold text-slate-500 text-xs uppercase tracking-wider">Job Title</th>
                        <th class="text-left px-5 py-3.5 font-semibold text-slate-500 text-xs uppercase tracking-wider hidden sm:table-cell">Department</th>
                        <th class="text-left px-5 py-3.5 font-semibold text-slate-500 text-xs uppercase tracking-wider hidden md:table-cell">Location</th>
                        <th class="text-left px-5 py-3.5 font-semibold text-slate-500 text-xs uppercase tracking-wider hidden lg:table-cell">Openings</th>
                        <th class="text-left px-5 py-3.5 font-semibold text-slate-500 text-xs uppercase tracking-wider hidden lg:table-cell">Date</th>
                        <th class="text-right px-5 py-3.5 font-semibold text-slate-500 text-xs uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50" id="jobs-tbody">

                    <!-- Empty state row -->
                    <tr th:if="${#lists.isEmpty(jobs)}">
                        <td colspan="7" class="px-5 py-16 text-center">
                            <div class="flex flex-col items-center gap-3">
                                <div class="w-14 h-14 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center">
                                    <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                </div>
                                <div>
                                    <p class="font-semibold text-slate-700">All caught up!</p>
                                    <p class="text-xs text-slate-400 mt-0.5">There are no pending jobs awaiting your approval.</p>
                                </div>
                            </div>
                        </td>
                    </tr>

                    <!-- Job rows -->
                    <tr th:each="job, iStat : ${jobs}"
                        class="hover:bg-slate-50/60 transition-colors group">

                        <!-- Row # -->
                        <td class="px-5 py-4 text-slate-400 text-xs font-mono"
                            th:text="${iStat.count}">1</td>

                        <!-- Title + Category -->
                        <td class="px-5 py-4">
                            <div class="font-semibold text-slate-800 group-hover:text-emerald-700 transition-colors"
                                 th:text="${job.title}">Job Title</div>
                            <div th:if="${job.category != null}" class="mt-0.5">
                                <span class="inline-block px-1.5 py-0.5 bg-indigo-50 text-indigo-600 text-[10px] font-bold rounded border border-indigo-100"
                                      th:text="${job.category.name}">Category</span>
                            </div>
                        </td>

                        <!-- Department -->
                        <td class="px-5 py-4 text-slate-500 hidden sm:table-cell"
                            th:text="${job.department != null ? job.department : '—'}">Dept</td>

                        <!-- Location -->
                        <td class="px-5 py-4 text-slate-500 hidden md:table-cell"
                            th:text="${job.location != null and !job.location.isEmpty() ? job.location : '—'}">—</td>

                        <!-- Openings -->
                        <td class="px-5 py-4 hidden lg:table-cell">
                            <span class="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full text-xs font-bold">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
                                </svg>
                                <span th:text="${job.noOfPosts}">1</span>
                            </span>
                        </td>

                        <!-- Date -->
                        <td class="px-5 py-4 text-slate-400 text-xs hidden lg:table-cell"
                            th:text="${job.createdAt != null ? #temporals.format(job.createdAt, 'dd/MM/yy') : '—'}">—</td>

                        <!-- Actions -->
                        <td class="px-5 py-4">
                            <div class="flex items-center justify-end gap-2">
                                
                                <!-- Reject -->
                                <form th:action="@{/jobs/{id}/reject(id=${job.id})}" method="POST" class="inline" th:id="'reject-form-' + ${job.id}">
                                    <input type="hidden" name="note" th:id="'reject-note-' + ${job.id}">
                                    <button type="button" th:onclick="'openRemarksModal(\'Reject Job Vacancy\', \'Provide rejection remarks for this job vacancy:\', \'reject-form-\' + ' + ${job.id} + ', \'reject-note-\' + ' + ${job.id} + ')'"
                                            class="inline-flex items-center gap-1 px-3 py-1.5 bg-rose-50 text-rose-700 text-xs font-bold rounded-lg hover:bg-rose-100 transition border border-rose-100">
                                        Reject
                                    </button>
                                </form>

                                <!-- Approve -->
                                <form th:action="@{/jobs/{id}/approve(id=${job.id})}" method="POST" class="inline" th:id="'approve-form-' + ${job.id}">
                                    <input type="hidden" name="note" th:id="'approve-note-' + ${job.id}">
                                    <button type="button" th:onclick="'openRemarksModal(\'Approve Job Vacancy\', \'Provide approval remarks for this job vacancy:\', \'approve-form-\' + ' + ${job.id} + ', \'approve-note-\' + ' + ${job.id} + ')'"
                                            class="inline-flex items-center gap-1 px-3 py-1.5 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 transition shadow-sm shadow-emerald-200">
                                        Approve
                                    </button>
                                </form>
                                
                                <!-- View pipeline -->
                                <a th:href="@{/jobs/{id}(id=${job.id})}"
                                   title="View Details"
                                   class="p-1.5 rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition ml-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </a>

                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
