<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head></head>
<body>
    <div th:fragment="content">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
            <h3 class="text-2xl font-bold text-slate-800 mb-6">Offer Details</h3>
            <form th:action="@{/offers/generate}" method="POST" class="space-y-6">
                <input type="hidden" name="candidateId" th:value="${candidate.id}">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Applicant</label>
                    <input type="text" th:value="${candidate.fullName}" disabled class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-slate-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Position</label>
                    <select name="jobVacancyId" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none text-slate-500 pointer-events-none">
                        <option th:each="j : ${jobs}" th:value="${j.id}" th:text="${j.title}" th:selected="${candidate.jobVacancy != null and candidate.jobVacancy.id == j.id}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Monthly Salary (SGD)</label>
                    <input type="number" name="salary" step="0.01" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. 5500.00">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-100">
                        Generate Preview
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
