<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23059669'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3ESTIE%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div th:fragment="content">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
            <h3 class="text-2xl font-bold text-slate-800 mb-6">Offer Details</h3>
            <form th:action="@{/offers/generate}" method="POST" class="space-y-6">
                <input type="hidden" name="candidateId" th:value="${candidate.id}">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Applicant</label>
                    <input type="text" th:value="${candidate.fullName}" disabled class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-slate-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Position</label>
                    <select name="jobVacancyId" required class="w-full px-4 py-2 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                        <option th:each="j : ${jobs}" th:value="${j.id}" th:text="${j.title}" th:selected="${latestInterview != null and latestInterview.jobVacancy != null and latestInterview.jobVacancy.id == j.id}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Reporting To</label>
                    <input type="text" name="reportingTo" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. HR Manager">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Monthly Salary (SGD)</label>
                    <input type="number" name="salary" step="0.01" th:value="${salary != null ? #strings.replace(#strings.replace(salary.basic, '$', ''), ',', '') : ''}" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. 5500.00">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">Commencement Date</label>
                        <input type="date" name="commencementDate" th:value="${scorecard != null ? scorecard.commencementDate : ''}" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">Acceptance Deadline</label>
                        <input type="date" name="acceptanceDeadline" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Location</label>
                    <input type="text" name="location" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. Head Office">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-100">
                        Submit and Preview
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
