<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23059669'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3ESTIE%3C/text%3E%3C/svg%3E">
</head>
<body>
<div th:fragment="content">
    <div class="mb-8 flex items-center justify-between">
        <div>
            <h3 class="text-3xl font-bold text-slate-800">Job Categories</h3>
            <p class="text-slate-500 mt-1">Manage job categories and their specific skills.</p>
        </div>
        <button onclick="document.getElementById('createCategoryForm').classList.toggle('hidden')"
           class="inline-flex items-center gap-2 px-5 py-3 bg-emerald-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-500/30 hover:bg-emerald-700 hover:scale-[1.02] transition-all text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
            New Category
        </button>
    </div>


    <!-- Create Form (Hidden by default) -->
    <div id="createCategoryForm" class="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hidden">
        <h4 class="font-bold text-slate-700 mb-4 text-sm uppercase tracking-widest">Add New Category</h4>
        <form th:action="@{/settings/categories/create}" method="post" class="flex gap-4">
            <input type="text" name="name" required placeholder="e.g. Software Engineering"
                   class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-400">
            <button type="submit" class="px-6 py-2 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition-colors text-sm">Save</button>
        </form>
    </div>

    <div class="bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-xl shadow-slate-200/50">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-slate-100">
                        <th class="px-4 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Category Name</th>
                        <th class="px-4 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Skills</th>
                        <th class="px-4 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="cat : ${categories}" class="group hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-4 text-sm font-semibold text-slate-700" th:text="${cat.name}">Engineering</td>
                        <td class="px-4 py-4 text-xs text-slate-500">
                            <div th:if="${#lists.size(cat.skills)} > 0" class="relative inline-block">
                                <span class="cursor-pointer underline decoration-dotted decoration-slate-300 hover:decoration-indigo-400" 
                                      th:data-catname="${cat.name}" th:data-catid="${cat.id}"
                                      onclick="openSkillsModal(this.getAttribute('data-catname'), this.getAttribute('data-catid'))"
                                      title="Click to view skills">View skills</span>
                                <div th:id="'skillsData-' + ${cat.id}" class="hidden">
                                    <div th:each="s : ${cat.skills}" th:text="${s.name}" class="skill-item"></div>
                                </div>
                            </div>
                            <span th:unless="${#lists.size(cat.skills)} > 0" class="text-slate-400 italic text-xs">No skills</span>
                        </td>
                        <td class="px-4 py-4 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <a th:href="@{'/settings/categories/' + ${cat.id} + '/skills'}"
                                   class="px-3 py-1.5 text-xs font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-lg transition-colors">
                                    Manage Skills
                                </a>
                                <button type="button" class="p-1.5 text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg transition-colors" title="Edit"
                                        th:data-id="${cat.id}" th:data-name="${cat.name}" onclick="editCategory(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                </button>
                                <form th:id="'editForm-' + ${cat.id}" th:action="@{'/settings/categories/' + ${cat.id} + '/update'}" method="POST" style="display:none">
                                    <input type="hidden" name="name" th:id="'editInput-' + ${cat.id}">
                                </form>
                                <form th:action="@{'/settings/categories/' + ${cat.id} + '/delete'}" method="POST" style="display:inline"
                                      onsubmit="return confirm('Delete this category and all its skills?')">
                                    <button type="submit" class="p-1.5 text-rose-400 hover:bg-rose-50 rounded-lg transition-colors" title="Delete">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="3" class="py-12 text-center text-slate-400 text-sm font-medium">
                            No categories configured yet.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- Skills Modal -->
    <div id="skillsModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl scale-95 opacity-0 transition-all duration-200" id="skillsModalContent">
            <div class="flex items-center justify-between mb-4">
                <h4 class="text-lg font-bold text-slate-800" id="skillsModalTitle">Category Skills</h4>
                <button onclick="closeSkillsModal()" class="text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 p-2 rounded-xl transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <ul id="skillsModalList" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                <!-- Skills injected here -->
            </ul>
        </div>
    </div>

    <script>
        function editCategory(id, oldName) {
            var newName = prompt("Edit Category Name:", oldName);
            if (newName && newName.trim() !== '' && newName !== oldName) {
                document.getElementById('editInput-' + id).value = newName.trim();
                document.getElementById('editForm-' + id).submit();
            }
        }

        function openSkillsModal(categoryName, catId) {
            document.getElementById('skillsModalTitle').textContent = categoryName + ' Skills';
            const list = document.getElementById('skillsModalList');
            list.innerHTML = '';
            
            const skillItems = document.querySelectorAll('#skillsData-' + catId + ' .skill-item');
            if (skillItems.length > 0) {
                skillItems.forEach(function(item) {
                    const li = document.createElement('li');
                    li.className = "px-3 py-2 bg-slate-50 border border-slate-100 rounded-lg text-sm text-slate-600 font-medium";
                    li.textContent = item.textContent;
                    list.appendChild(li);
                });
            } else {
                list.innerHTML = '<li class="text-sm text-slate-400 italic">No skills configured.</li>';
            }
            
            const modal = document.getElementById('skillsModal');
            const modalContent = document.getElementById('skillsModalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeSkillsModal() {
            const modal = document.getElementById('skillsModal');
            const modalContent = document.getElementById('skillsModalContent');
            
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        }
    </script>
</div>
</body>
</html>
