<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23059669'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='32' font-weight='bold' fill='white' text-anchor='middle'%3ESTIE%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div th:fragment="content">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
            <h3 class="text-2xl font-bold text-slate-800 mb-6">Finalize Hire Details</h3>
            <form th:action="@{/candidates/hire}" method="POST" enctype="multipart/form-data" class="space-y-6">
                <input type="hidden" name="candidateId" th:value="${candidate.id}">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Applicant</label>
                    <input type="text" th:value="${candidate.fullName}" disabled class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-slate-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Final Monthly Salary (SGD)</label>
                    <input type="number" name="finalSalary" step="0.01" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="e.g. 5500.00">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Joining Date</label>
                    <input type="date" name="joiningDate" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Notes / Remarks</label>
                    <textarea name="hireNotes" rows="3" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Any final notes about the hire..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Signed Offer Letter (PDF/DOC)</label>
                    <input type="file" name="signedOfferFile" accept=".pdf,.doc,.docx" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    <p class="text-xs text-slate-400 mt-1">Upload the officially signed offer letter.</p>
                </div>
                <div class="pt-4 flex gap-3">
                    <a th:href="@{/candidates/kanban}" class="flex-1 py-3 bg-slate-100 text-slate-600 text-center rounded-xl font-bold hover:bg-slate-200 transition-colors">Cancel</a>
                    <button type="submit" class="flex-1 py-3 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 transition-colors shadow-lg shadow-teal-100">
                        Confirm Hire
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
