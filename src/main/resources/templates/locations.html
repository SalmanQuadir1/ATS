<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head></head>
<body>
<div th:fragment="content">
    <div class="mb-8 flex items-center justify-between">
        <div>
            <h3 class="text-3xl font-bold text-slate-800">Locations</h3>
            <p class="text-slate-500 mt-1">Manage work locations for your organization.</p>
        </div>
        <a th:href="@{/locations/new}"
           class="inline-flex items-center gap-2 px-5 py-3 bg-emerald-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-500/30 hover:bg-emerald-700 hover:scale-[1.02] transition-all text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
            New Location
        </a>
    </div>

    <div class="bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-xl shadow-slate-200/50">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-slate-100">
                        <th class="px-4 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">ID</th>
                        <th class="px-4 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Name</th>
                        <th class="px-4 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Tenant</th>
                        <th class="px-4 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr th:each="loc : ${locations}" class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-4 text-xs text-slate-400" th:text="${loc.id}">1</td>
                        <td class="px-4 py-4 text-sm font-semibold text-slate-700" th:text="${loc.name}">New York HQ</td>
                        <td class="px-4 py-4 text-sm text-slate-600" th:text="${loc.tenant != null ? loc.tenant.name : 'Global'}">Global</td>
                        <td class="px-4 py-4 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <a th:href="@{'/locations/' + ${loc.id} + '/edit'}"
                                   class="p-2 text-indigo-500 hover:bg-indigo-50 rounded-xl transition-colors" title="Edit">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </a>
                                <form th:action="@{'/locations/' + ${loc.id} + '/delete'}" method="POST" style="display:inline"
                                      onsubmit="return confirm('Delete this location?')">
                                    <button type="submit" class="p-2 text-rose-400 hover:bg-rose-50 rounded-xl transition-colors" title="Delete">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(locations)}">
                        <td colspan="4" class="py-12 text-center text-slate-400">
                            <p class="text-sm font-medium">No locations configured yet.</p>
                            <a th:href="@{/locations/new}" class="text-emerald-600 text-sm font-bold hover:underline mt-1 inline-block">Create your first location</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
