# Server Configuration
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ats_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Database Configuration (H2 - Disabled)
# spring.datasource.url=jdbc:h2:mem:ats_db;DB_CLOSE_DELAY=-1;MODE=MySQL
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Singapore Standard Logging
logging.level.com.stie=DEBUG

# ─── Job Board Distribution ────────────────────────────────────────────────────
# Fill in your credentials to enable live posting from the Job Detail page.
# Leave blank to gracefully skip (no error, warning logged instead).

# LinkedIn Job Postings API
# Requires: Marketing Developer Platform approval + a Company Page
# Docs: https://learn.microsoft.com/en-us/linkedin/talent/job-postings
linkedin.access.token=
linkedin.organization.id=

# JobStreet / SEEK Advertiser API
# Requires: Approved SEEK Advertiser account (Southeast Asia)
# Docs: https://developer.seek.com
jobstreet.api.key=
jobstreet.advertiser.id=

# Indeed Publisher API
# Requires: Approved Indeed Publisher account
# Docs: https://developer.indeed.com
indeed.publisher.key=

# ─── Email / SMTP Configuration ───────────────────────────────────────────────
# To enable real email sending (interview invites, reminders, outcome emails):
# 1. Replace the placeholders below with your Gmail credentials.
# 2. Enable "App Passwords" in your Google account (required if 2FA is on).
# 3. Restart the application.
# Leave blank to use mock/console logging only.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── Interview Reminder Scheduler ─────────────────────────────────────────────
# Runs every hour automatically. Sends 24h-ahead reminders with .ics calendar
# attachments. No configuration needed — @EnableScheduling is in AtsApplication.

